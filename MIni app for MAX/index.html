<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Волонтёрство MAX</title>
    <meta name="description" content="Мини-приложение для волонтёрства в мессенджере MAX">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Unbounded:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=20260422-7">
    <script src="https://st.max.ru/js/max-web-app.js"></script>
</head>
<body>
    <!-- ============ LOADING SCREEN ============ -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-logo">
            <div class="loading-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="24" r="20" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" stroke-dasharray="80 40" class="loading-spinner"/>
                    <defs>
                        <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48">
                            <stop offset="0%" stop-color="#818CF8"/>
                            <stop offset="100%" stop-color="#6366F1"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <p class="loading-text">Загрузка...</p>
        </div>
    </div>

    <!-- ============ MAIN APP ============ -->
    <div id="app" class="app hidden">

        <!-- ======= HEADER ======= -->
        <header class="header">
            <div class="header-inner">
                <div class="header-left">
                    <button id="btn-back" class="header-btn hidden" aria-label="Назад">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>
                    <h1 class="header-title" id="header-title">Волонтёрство</h1>
                </div>
            </div>
        </header>

        <!-- ======= VOLUNTEER PAGES ======= -->

        <!-- Volunteer: Dashboard -->
        <main id="page-volunteer-dashboard" class="page hidden">
            <div class="page-content">
                <!-- Profile Card -->
                <section class="profile-card glass-card">
                    <div class="profile-header">
                        <div class="profile-avatar-large" id="vol-avatar"></div>
                        <div class="profile-info">
                            <h2 class="profile-name" id="vol-name">—</h2>
                            <span class="profile-role badge badge-volunteer">Волонтёр</span>
                        </div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="vol-events-count">0</span>
                            <span class="stat-label">Мероприятий</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="vol-hours">0</span>
                            <span class="stat-label">Часов</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="vol-rating">—</span>
                            <span class="stat-label">Рейтинг</span>
                        </div>
                    </div>
                </section>

                <!-- Personal Info -->
                <section class="section-card glass-card">
                    <div class="section-header" data-toggle="vol-personal-info">
                        <h3 class="section-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            Личные данные
                        </h3>
                        <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </div>
                    <div class="section-body collapsed" id="vol-personal-info">
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">Имя</span>
                                <span class="info-value" id="vol-full-name">—</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Город</span>
                                <span class="info-value" id="vol-city">—</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Телефон</span>
                                <span class="info-value" id="vol-phone">—</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Дата рождения</span>
                                <span class="info-value" id="vol-birth-date">—</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Рейтинг</span>
                                <span class="info-value" id="vol-rating-info">—</span>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Quick Actions -->
                <section class="quick-actions">
                    <button class="action-card glass-card" id="btn-vol-events">
                        <div class="action-icon action-icon-events">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21V4"/><path d="M6 4h12l-2.5 4L18 12H6"/></svg>
                        </div>
                        <span class="action-label">Мероприятия</span>
                        <span class="action-badge" id="vol-available-count">0</span>
                    </button>
                    <button class="action-card glass-card" id="btn-vol-history">
                        <div class="action-icon action-icon-history">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8.5 12.5 7 22l5-3 5 3-1.5-9.5"/></svg>
                        </div>
                        <span class="action-label">История</span>
                        <span class="action-badge" id="vol-history-count">0</span>
                    </button>
                </section>

                <!-- Registered Events Preview -->
                <section class="section-card glass-card registered-preview-card">
                    <div class="section-header static-section-header">
                        <h3 class="section-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l2 2 4-4"/><path d="M20 6 9 17l-5-5"/></svg>
                            Мои записи
                        </h3>
                        <button class="section-action" id="btn-vol-registered-all" type="button">
                            Все <span id="vol-registered-count">0</span>
                        </button>
                    </div>
                    <div class="section-body registered-preview-list" id="vol-registered-preview">
                        <!-- Registered events populated by JS -->
                    </div>
                </section>
            </div>
        </main>

        <!-- Volunteer: Events List -->
        <main id="page-volunteer-events" class="page hidden">
            <div class="page-content">
                <div class="search-bar glass-card">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="search-events" class="search-input" placeholder="Поиск мероприятий...">
                </div>
                <div class="events-list" id="vol-events-list">
                    <!-- Events populated by JS -->
                </div>
            </div>
        </main>

        <!-- Volunteer: Registered Events -->
        <main id="page-volunteer-registered" class="page hidden">
            <div class="page-content">
                <div class="events-list" id="vol-registered-list">
                    <!-- Registered events populated by JS -->
                </div>
            </div>
        </main>

        <!-- Volunteer: Event Detail -->
        <main id="page-event-detail" class="page hidden">
            <div class="page-content">
                <div class="event-detail-card glass-card" id="event-detail-content">
                    <!-- Populated by JS -->
                </div>
            </div>
        </main>

        <!-- Volunteer: History -->
        <main id="page-volunteer-history" class="page hidden">
            <div class="page-content">
                <div class="history-list" id="vol-history-list">
                    <!-- History populated by JS -->
                </div>
            </div>
        </main>

        <!-- ======= ORGANIZER PAGES ======= -->

        <!-- Organizer: Dashboard -->
        <main id="page-organizer-dashboard" class="page hidden">
            <div class="page-content">
                <!-- Profile Card -->
                <section class="profile-card glass-card">
                    <div class="profile-header">
                        <div class="profile-avatar-large" id="org-avatar"></div>
                        <div class="profile-info">
                            <h2 class="profile-name" id="org-name">—</h2>
                            <span class="profile-role badge badge-organizer">Организатор</span>
                        </div>
                    </div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="org-events-total">0</span>
                            <span class="stat-label">Мероприятий</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="org-volunteers-total">0</span>
                            <span class="stat-label">Записей</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="org-active-count">0</span>
                            <span class="stat-label">Активных</span>
                        </div>
                    </div>
                </section>

                <!-- Quick Actions -->
                <section class="quick-actions">
                    <button class="action-card glass-card" id="btn-org-events">
                        <div class="action-icon action-icon-events">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21V4"/><path d="M6 4h12l-2.5 4L18 12H6"/></svg>
                        </div>
                        <span class="action-label">Мои мероприятия</span>
                        <span class="action-badge" id="org-my-events-count">0</span>
                    </button>
                    <button class="action-card glass-card" id="btn-org-create">
                        <div class="action-icon action-icon-create">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 12v6"/><path d="M9 15h6"/></svg>
                        </div>
                        <span class="action-label">Создать</span>
                    </button>
                </section>

                <!-- Recent Events Preview -->
                <section class="section-card glass-card">
                    <div class="section-header">
                        <h3 class="section-title">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            Последние мероприятия
                        </h3>
                    </div>
                    <div class="section-body" id="org-recent-events">
                        <!-- Populated by JS -->
                    </div>
                </section>
            </div>
        </main>

        <!-- Organizer: My Events -->
        <main id="page-organizer-events" class="page hidden">
            <div class="page-content">
                <div class="events-list" id="org-events-list">
                    <!-- Events populated by JS -->
                </div>
                <button class="fab" id="fab-create-event">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
            </div>
        </main>

        <!-- Organizer: Create Event -->
        <main id="page-organizer-create" class="page hidden">
            <div class="page-content">
                <form class="create-form glass-card" id="create-event-form">
                    <div class="form-group">
                        <label class="form-label" for="event-title">Название мероприятия</label>
                        <input type="text" id="event-title" class="form-input" placeholder="Например: Уборка парка" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="event-description">Описание</label>
                        <textarea id="event-description" class="form-input form-textarea" placeholder="Опишите мероприятие..." rows="4" required></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="event-date">Дата</label>
                            <input type="date" id="event-date" class="form-input" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="event-time">Время</label>
                            <input type="time" id="event-time" class="form-input" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="event-city">Город</label>
                        <input type="text" id="event-city" class="form-input" placeholder="Город проведения" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="event-address">Адрес</label>
                        <input type="text" id="event-address" class="form-input" placeholder="Точный адрес" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="event-volunteers">Нужно волонтёров</label>
                        <input type="number" id="event-volunteers" class="form-input" placeholder="10" min="1" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="event-duration">Длительность, часов</label>
                            <input type="number" id="event-duration" class="form-input" placeholder="4" min="0" step="1">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="event-certificate">Сертификат</label>
                            <select id="event-certificate" class="form-input">
                                <option value="none">Не выдаётся</option>
                                <option value="international">Международный</option>
                                <option value="russian">Всероссийский</option>
                                <option value="regional">Региональный</option>
                                <option value="university">Университетский</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="event-inventory">Инвентарь</label>
                        <textarea id="event-inventory" class="form-input form-textarea" placeholder="Например: перчатки, мешки, вода. Если ничего не нужно — оставьте пустым." rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="event-category">Категория</label>
                        <select id="event-category" class="form-input" required>
                            <option value="">Выберите категорию</option>
                            <option value="ecology">🌿 Экология</option>
                            <option value="social">🤝 Социальная помощь</option>
                            <option value="education">📚 Образование</option>
                            <option value="sport">⚽ Спорт</option>
                            <option value="culture">🎭 Культура</option>
                            <option value="animals">🐾 Помощь животным</option>
                            <option value="other">📌 Другое</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary" id="btn-submit-event">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
                        Создать мероприятие
                    </button>
                </form>
            </div>
        </main>

        <!-- ======= BOTTOM NAV ======= -->
        <nav class="bottom-nav" id="bottom-nav">
            <!-- Volunteer Nav -->
            <div class="nav-volunteer hidden" id="nav-volunteer">
                <button class="nav-item active" data-page="volunteer-dashboard">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Главная</span>
                </button>
                <button class="nav-item" data-page="volunteer-events">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21V4"/><path d="M6 4h12l-2.5 4L18 12H6"/></svg>
                    <span>Мероприятия</span>
                </button>
                <button class="nav-item" data-page="volunteer-history">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M8.5 12.5 7 22l5-3 5 3-1.5-9.5"/></svg>
                    <span>История</span>
                </button>
            </div>
            <!-- Organizer Nav -->
            <div class="nav-organizer hidden" id="nav-organizer">
                <button class="nav-item active" data-page="organizer-dashboard">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    <span>Главная</span>
                </button>
                <button class="nav-item" data-page="organizer-events">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21V4"/><path d="M6 4h12l-2.5 4L18 12H6"/></svg>
                    <span>Мероприятия</span>
                </button>
                <button class="nav-item" data-page="organizer-create">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M12 12v6"/><path d="M9 15h6"/></svg>
                    <span>Создать</span>
                </button>
            </div>
        </nav>

        <!-- Toast -->
        <div class="toast hidden" id="toast">
            <span id="toast-message"></span>
        </div>
    </div>

    <script src="app.js?v=20260422-7"></script>
</body>
</html>
